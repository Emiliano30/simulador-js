
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <title>Registro - Portal Médico</title>
</head>
<body class="auth-page">
    <div class="auth-card animate__animated animate__fadeInRight">
        <h2>Crear Cuenta</h2>
        <p>Complete sus datos para registrarse</p>

        <form id="registerForm" class="auth-form">
            <input id="nombre" type="text" placeholder="Nombre completo" required>
            <input id="email" type="email" placeholder="Correo electrónico" required>
            <input id="password" type="password" placeholder="Establecer contraseña" required>
            <button type="submit" class="btn-full">Confirmar Registro</button>
        </form>

        <p id="mensaje" class="info-msg" style="display: none"></p>
        
        <div class="auth-footer">
            <a href="login.html">¿Ya tiene cuenta? Iniciar sesión</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/core.js"></script>
    <script src="./js/register.js"></script>
</body>
</html>
